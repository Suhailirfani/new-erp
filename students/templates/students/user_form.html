{% extends 'students/base.html' %}
{% block content %}

<h1>{{ title }}</h1>

<div class="card" style="padding: 1.5rem; max-width: 600px; margin: 0 auto;">
    <form method="post">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                    <small style="color:#666; display:block; margin-top:5px;">{{ field.help_text }}</small>
                {% endif %}
                {% if field.errors %}
                    <div style="color:red; margin-top:5px;">{{ field.errors }}</div>
                {% endif %}
            </div>
        {% endfor %}

        <div style="margin-top: 20px;">
            <button type="submit" class="btn btn-success">Save User</button>
            <a href="{% url 'students:user_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
