{% extends 'students/base.html' %}
{% block content %}

<h1>Edit Student - {{ student.full_name }}</h1>

<div class="card" style="padding: 1.5rem;">
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Student ID</label>
            <input type="text" name="student_id" value="{{ student.student_id }}" required>
        </div>

        <div class="form-group">
            <label>First Name</label>
            <input type="text" name="first_name" value="{{ student.first_name }}" required>
        </div>

        <div class="form-group">
            <label>Last Name</label>
            <input type="text" name="last_name" value="{{ student.last_name }}" required>
        </div>

        <div class="form-group">
            <label>Grade</label>
            <input type="text" name="grade" value="{{ enrollment.grade|default:'' }}" required>
        </div>

        <div class="form-group">
            <label>Division</label>
            <select name="division">
                <option value="">-- No Division --</option>
                {% for div in divisions %}
                <option value="{{ div.id }}" {% if enrollment and enrollment.division_id == div.id %}selected{% endif %}>{{ div.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Room</label>
            <select name="room">
                <option value="">-- No Room --</option>
                {% for room in rooms %}
                <option value="{{ room.id }}" {% if enrollment and enrollment.room_id == room.id %}selected{% endif %}>{{ room.room_number }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Student Type</label>
            <select name="student_type">
                <option value="hostel" {% if student.student_type == 'hostel' %}selected{% endif %}>Hostel</option>
                <option value="day_scholar" {% if student.student_type == 'day_scholar' %}selected{% endif %}>Day Scholar</option>
            </select>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ student.email }}">
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" value="{{ student.phone }}">
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="address">{{ student.address }}</textarea>
        </div>

        <button class="btn btn-success">Save Changes</button>
        <a href="{% url 'students:student_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
