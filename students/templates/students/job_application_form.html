{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for {{ job.title }} | MARKAZ HADIYA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6a0606;
            --accent: #a00000;
            --text-gold: #f1c40f;
            --dark-bg: #1a0202;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px; /* Reduced for mobile */
        }

        .form-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 100%;
            max-width: 650px;
            padding: 40px 30px; /* More balanced padding */
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            margin: 20px 0;
        }

        .form-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .form-header h1 {
            font-family: 'Cinzel', serif;
            color: var(--text-gold);
            font-size: 1.8rem; /* Slightly larger */
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .form-header p {
            opacity: 0.6;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 18px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--text-gold);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 4px rgba(241, 196, 15, 0.15);
        }

        .row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 600px) {
            .row {
                grid-template-columns: 1fr;
                gap: 0;
            }
            .form-container {
                padding: 30px 20px;
                border-radius: 20px;
            }
            .form-header h1 {
                font-size: 1.5rem;
            }
            .btn-submit {
                font-size: 1rem;
                padding: 14px;
            }
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn-cancel {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .btn-cancel:hover {
            color: var(--text-gold);
        }

        .optional-badge {
            font-size: 0.7rem;
            color: var(--gray);
            font-weight: 400;
            margin-left: 5px;
            text-transform: none;
        }

        input[type="file"] {
            padding: 12px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <p>Application for</p>
            <h1>{{ job.title }}</h1>
        </div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Full Name</label>
                {{ form.full_name }}
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Email Address</label>
                    {{ form.email }}
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    {{ form.phone }}
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Qualification</label>
                    {{ form.qualification }}
                </div>
                <div class="form-group">
                    <label>Experience</label>
                    {{ form.experience }}
                </div>
            </div>

            <div class="form-group">
                <label>Resume / CV <span class="optional-badge">(Optional)</span></label>
                {{ form.resume }}
            </div>

            <div class="form-group">
                <label>Cover Letter / Info <span class="optional-badge">(Optional)</span></label>
                {{ form.cover_letter }}
            </div>

            <button type="submit" class="btn-submit">Submit Application</button>
            <a href="{% url 'students:career' %}" class="btn-cancel">Cancel and Go Back</a>
        </form>
    </div>
</body>
</html>
