{% extends 'students/base.html' %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="row pt-5 mt-5">
    <div class="col-md-6 offset-md-3">
        <div class="card border-0 shadow-lg" style="border-radius: 20px;">
            <div class="card-body p-5 text-center">
                <div class="mb-4">
                    <i class="fas fa-exclamation-triangle text-danger" style="font-size: 5rem;"></i>
                </div>
                
                <h3 class="fw-bold mb-3">Are you sure?</h3>
                
                <p class="text-muted fs-5 mb-4">
                    You are about to delete <strong>"{{ object }}"</strong>.<br>
                    This action cannot be undone. Are you absolutely certain?
                </p>

                <form method="post" action="">
                    {% csrf_token %}
                    <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                        <a href="{% url 'fees:fee_setup_dashboard' %}" class="btn btn-light px-4 py-2 fs-5 text-muted border border-secondary shadow-sm"><i class="fas fa-times me-2"></i>Cancel</a>
                        <button type="submit" class="btn btn-danger px-4 py-2 fs-5 shadow-sm"><i class="fas fa-trash-alt me-2"></i>Yes, Delete It</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
